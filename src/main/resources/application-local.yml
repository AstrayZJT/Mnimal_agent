spring:
  datasource:
    url: jdbc:h2:file:./data/agentdemo-local;MODE=PostgreSQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

app:
  generated-output-dir: generated-output
  history-limit: 20
